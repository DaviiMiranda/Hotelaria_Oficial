<div class="container mb-5 pb-5" style="margin-top: 4rem;">
  <div class="card border-0 mx-auto w-100" style="max-width: 1000px;">
    <div class="card-header border-0 text-center pb-0 pt-4">
      <h2 class="mb-2" style="font-family: 'Playfair Display', serif; font-size: 2.2rem;">Hóspedes Registrados</h2>
      <p class="text-muted mb-4">Painel administrativo de clientes atuais do Hôtel L'Avenir.</p>
    </div>
    <div class="card-body p-5 pt-2">
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
          <thead class="table-custom">
            <tr>
              <th>Name</th>
              <th>CPF</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Date In</th>
              <th>Date Out</th>
              <th>Room</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let guest of guests">
              <td class="fw-semibold">{{ guest.name }}</td>
              <td>{{ guest.cpf }}</td>
              <td>{{ guest.email }}</td>
              <td>{{ guest.telephone }}</td>
              <td>{{ guest.checkInDate }}</td>
              <td>{{ guest.checkOutDate }}</td>
              <td><span class="badge bg-secondary">{{ guest.roomType }}</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
